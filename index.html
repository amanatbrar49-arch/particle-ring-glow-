<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Glow Particle Ring — Hand Tracker</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; height:100%; }
  #container { position:relative; width:100vw; height:100vh; }
  video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  #hint {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.6); font:12px monospace; letter-spacing:1px;
    background:rgba(0,0,0,0.4); padding:6px 14px; border-radius:20px; pointer-events:none;
    text-align:center; white-space:nowrap;
  }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="output"></canvas>
  <div id="hint">ring sits on your index fingertip — open the OTHER palm to expand it</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('output');
const ctx = canvasElement.getContext('2d');

// offscreen canvas just for the trailing dust particles — everything else
// stays crisp/no-trail on the main canvas
const trailCanvas = document.createElement('canvas');
const trailCtx = trailCanvas.getContext('2d');

// offscreen, downsampled canvas used purely to build a real bloom (blurred
// bright-pass) layer that gets screened back on top each frame
const bloomCanvas = document.createElement('canvas');
const bloomCtx = bloomCanvas.getContext('2d');
const BLOOM_SCALE = 0.35;

function resize(){
  canvasElement.width = window.innerWidth;
  canvasElement.height = window.innerHeight;
  trailCanvas.width = window.innerWidth;
  trailCanvas.height = window.innerHeight;
  bloomCanvas.width = Math.max(1, Math.round(window.innerWidth * BLOOM_SCALE));
  bloomCanvas.height = Math.max(1, Math.round(window.innerHeight * BLOOM_SCALE));
}
window.addEventListener('resize', resize);
resize();

// ---------- Particle field (SAME look as the original: ring + halo dust + number tags) ----------
// Built twice now — two independent rings tumbling fast in 3D, like the atom/nucleus reference.
const NUM_PARTICLES = 210; // per ring (trimmed down slightly for a less dense field)

function buildParticles() {
  const particles = [];
  for (let i = 0; i < NUM_PARTICLES; i++) {
    const onRing = Math.random() < 0.55;
    particles.push({
      angle: Math.random() * Math.PI * 2,
      rJitter: onRing ? (1 + (Math.random() - 0.5) * 0.07) : (1 + Math.random() * 0.9),
      size: onRing ? Math.random() * 2 + 1 : Math.random() * 3 + 1,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: Math.random() * 0.05 + 0.02,
      group: i % 2, // splits each ring's particles into two halves that flicker as a unit
      zOff: (Math.random() - 0.5) * 0.6,
      label: Math.random() < 0.15 ? (Math.floor(Math.random() * 9000) + 1000) : null,
      isTrailDust: Math.random() < 0.035 // only a handful of particles leave a trail
    });
  }
  return particles;
}
let particlesA = buildParticles();
let particlesB = buildParticles();

// thin guide ellipse outline (same as original), one per ring
const GUIDE_STEPS = 100;
let guidePoints = [];
for (let i = 0; i <= GUIDE_STEPS; i++) {
  const a = (i / GUIDE_STEPS) * Math.PI * 2;
  guidePoints.push({ angle: a });
}

// independent fast 3D tumble per ring — dominant spin on one axis (the
// coin-flip / edge-on look from the reference video), slight wobble on the others
let rotA = { x: 0, y: 0, z: 0 };
let rotB = { x: 0.9, y: 2.1, z: 1.4 }; // offset start so they don't overlap perfectly
const SPEED_A = { x: 0.045, y: 0.24, z: 0.02 };
const SPEED_B = { x: 0.02, y: 0.21, z: 0.05 };

// each ring flickers as a whole — vanishing and reappearing at random, irregular
// intervals (true twinkle, not a smooth wave) — own timer so the two rings never sync
let flickerA = { visible: true, timer: 1 + Math.floor(Math.random() * 6) };
let flickerB = { visible: true, timer: 4 + Math.floor(Math.random() * 6) };

// within each ring, particles are split into two halves (group 0 / group 1) and only
// ONE half is ever shown at a time — it swaps to the other half on a fast, random-length
// beat, so the ring keeps something on screen while still reading as a fast flicker
let halfA = { active: 0, timer: 1 + Math.floor(Math.random() * 5) };
let halfB = { active: 1, timer: 3 + Math.floor(Math.random() * 5) };
function tickHalfSwap(state, minFrames, maxFrames) {
  state.timer -= 1;
  if (state.timer <= 0) {
    state.active = 1 - state.active;
    state.timer = minFrames + Math.floor(Math.random() * (maxFrames - minFrames + 1));
  }
}

// ---------------- Size state ----------------
const SMALL_PX = 16;   // tiny, sitting on the fingertip
const LARGE_PX = 420;  // fully expanded
let currentSizePx = SMALL_PX;
let targetSizePx = SMALL_PX;

// ---------------- Ring position (smoothed, follows the holding fingertip) ----------------
let ringPos = { x: 0.5, y: 0.5 };
let ringPosInit = false;

// ---------------- Hand tracking ----------------
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

let latestHands = [];
hands.onResults((results) => {
  latestHands = [];
  if (results.multiHandLandmarks) {
    for (const lm of results.multiHandLandmarks) latestHands.push(lm);
  }
});

const camera = new Camera(videoElement, {
  onFrame: async () => { await hands.send({ image: videoElement }); },
  width: 1280,
  height: 720
});
camera.start();

let holdingFingerPos = null;

function mirroredNorm(lm) { return { x: 1 - lm.x, y: lm.y }; }

function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y, dz = (a.z || 0) - (b.z || 0);
  return Math.sqrt(dx * dx + dy * dy + dz * dz);
}

function palmOpenness(lm) {
  const wrist = lm[0], midMcp = lm[9];
  const palmSize = dist(wrist, midMcp) || 0.0001;
  const tips = [8, 12, 16, 20].map(i => dist(wrist, lm[i]) / palmSize);
  const avg = tips.reduce((a, b) => a + b, 0) / tips.length;
  const t = (avg - 1.3) / (2.6 - 1.3);
  return Math.max(0, Math.min(1, t));
}

// drives a random, irregular on/off twinkle: counts down, then on expiry
// flips visibility and picks a new random-length duration for the next beat —
// this is what makes it read as true random twinkling instead of a wave
function tickFlicker(state, onProbability, minFrames, maxFrames) {
  state.timer -= 1;
  if (state.timer <= 0) {
    state.visible = Math.random() < onProbability;
    state.timer = minFrames + Math.floor(Math.random() * (maxFrames - minFrames + 1));
  }
}

// picks which hand is "holding" the ring; switches to whichever fingertip is
// currently closest to the ring's last known position
function pickHoldingHand() {
  if (latestHands.length === 0) return { holding: null, other: null };
  if (latestHands.length === 1) return { holding: latestHands[0], other: null };

  const tip0 = mirroredNorm(latestHands[0][8]);
  const tip1 = mirroredNorm(latestHands[1][8]);

  if (!holdingFingerPos) {
    holdingFingerPos = tip0;
    return { holding: latestHands[0], other: latestHands[1] };
  }
  const d0 = Math.hypot(tip0.x - holdingFingerPos.x, tip0.y - holdingFingerPos.y);
  const d1 = Math.hypot(tip1.x - holdingFingerPos.x, tip1.y - holdingFingerPos.y);
  if (d0 <= d1) return { holding: latestHands[0], other: latestHands[1] };
  return { holding: latestHands[1], other: latestHands[0] };
}

// ---------------- Draw loop ----------------
function draw() {
  const w = canvasElement.width, h = canvasElement.height;

  // main canvas: fully clear every frame — the ring itself stays crisp, no trail
  ctx.clearRect(0, 0, w, h);

  // trail canvas: only fades a little each frame, so only the dust particles
  // drawn onto it (not the whole ring) leave a glowing trail behind
  trailCtx.globalCompositeOperation = 'destination-out';
  trailCtx.fillStyle = 'rgba(0,0,0,0.08)';
  trailCtx.fillRect(0, 0, w, h);
  trailCtx.globalCompositeOperation = 'source-over';

  const { holding, other } = pickHoldingHand();

  if (holding) {
    const tipN = mirroredNorm(holding[8]);
    if (!ringPosInit) { ringPos.x = tipN.x; ringPos.y = tipN.y; ringPosInit = true; }
    ringPos.x += (tipN.x - ringPos.x) * 0.35;
    ringPos.y += (tipN.y - ringPos.y) * 0.35;
    holdingFingerPos = tipN;
  }

  if (other) {
    const openT = palmOpenness(other);
    targetSizePx = SMALL_PX + (LARGE_PX - SMALL_PX) * openT;
  } else {
    targetSizePx = SMALL_PX;
  }
  currentSizePx += (targetSizePx - currentSizePx) * 0.12;

  // keep tumbling fast, always, on all three axes — both rings, independently
  rotA.x += SPEED_A.x; rotA.y += SPEED_A.y; rotA.z += SPEED_A.z;
  rotB.x += SPEED_B.x; rotB.y += SPEED_B.y; rotB.z += SPEED_B.z;

  // fast, irregular ring flicker — each ring pops in and out at random beats
  tickFlicker(flickerA, 0.75, 2, 7);
  tickFlicker(flickerB, 0.75, 2, 7);
  const ringAVisible = flickerA.visible;
  const ringBVisible = flickerB.visible;

  // fast half-swap flicker — within each ring, one half shows while the other hides
  tickHalfSwap(halfA, 3, 9);
  tickHalfSwap(halfB, 3, 9);

  if (holding) {
    drawRing(particlesA, rotA, ringAVisible, halfA.active);
    drawRing(particlesB, rotB, ringBVisible, halfB.active);
  }

  // trail glow goes down first, crisp ring particles get drawn on top of it
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.drawImage(trailCanvas, 0, 0);
  ctx.restore();

  if (holding) {
    drawRingCrisp(particlesA, rotA, ringAVisible, halfA.active);
    drawRingCrisp(particlesB, rotB, ringBVisible, halfB.active);
    drawNucleus();
  }

  // ---- real bloom pass: grab the bright pixels just drawn, downsample +
  // blur them, and screen that glow back on top. Downsampling is what makes
  // a proper gaussian blur() cheap enough to run every frame. ----
  if (holding) {
    bloomCtx.clearRect(0, 0, bloomCanvas.width, bloomCanvas.height);
    bloomCtx.drawImage(canvasElement, 0, 0, bloomCanvas.width, bloomCanvas.height);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.filter = 'blur(4px)';
    ctx.globalAlpha = 0.9;
    ctx.drawImage(bloomCanvas, 0, 0, bloomCanvas.width, bloomCanvas.height, 0, 0, w, h);
    ctx.filter = 'none';
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  requestAnimationFrame(draw);
}

function drawNucleus() {
  const cx = ringPos.x * canvasElement.width, cy = ringPos.y * canvasElement.height;
  const now = Date.now() * 0.001;
  const pulse = 0.75 + 0.25 * Math.sin(now * 6);
  const nucR = Math.max(3, currentSizePx * 0.16) * pulse;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, nucR * 3);
  grad.addColorStop(0, 'rgba(255,255,255,0.95)');
  grad.addColorStop(0.35, 'rgba(200,225,255,0.5)');
  grad.addColorStop(1, 'rgba(200,225,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, nucR * 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.arc(cx, cy, nucR * 0.55, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function project3D(x, y, z, rot, cx, cy, scale, focal) {
  const cosX = Math.cos(rot.x), sinX = Math.sin(rot.x);
  const cosY = Math.cos(rot.y), sinY = Math.sin(rot.y);
  const cosZ = Math.cos(rot.z), sinZ = Math.sin(rot.z);

  let y1 = y * cosX - z * sinX;
  let z1 = y * sinX + z * cosX;
  y = y1; z = z1;

  let x1 = x * cosY + z * sinY;
  let z2 = -x * sinY + z * cosY;
  x = x1; z = z2;

  let x2 = x * cosZ - y * sinZ;
  let y2 = x * sinZ + y * cosZ;
  x = x2; y = y2;

  const px = x * scale, py = y * scale, pz = z * scale;
  const persp = focal / (focal + pz);
  return { x: cx + px * persp, y: cy + py * persp, persp };
}

function drawRing(particles, rot, ringVisible, activeHalf) {
  // trail pass: only the particles flagged isTrailDust get drawn here, onto trailCtx
  if (!ringVisible) return;
  const cx = ringPos.x * canvasElement.width, cy = ringPos.y * canvasElement.height;
  const focal = 500;
  const R = currentSizePx;
  const ringTiltX = 0.35;

  trailCtx.save();
  trailCtx.globalCompositeOperation = 'lighter';

  for (const p of particles) {
    if (!p.isTrailDust) continue;
    if (p.group !== activeHalf) continue; // only the currently-active half is shown
    const rad = p.rJitter;
    const ex = Math.cos(p.angle) * rad;
    const ey = Math.sin(p.angle) * rad * ringTiltX;
    const ez = p.zOff * rad;
    const pt = project3D(ex, ey, ez, rot, cx, cy, R, focal);

    const rawAlpha = 0.5 + 0.5 * Math.sin(p.twinkle);
    // ease toward the target alpha instead of snapping to it each frame —
    // this is what was reading as flicker on the trailing dust
    if (p.trailAlpha === undefined) p.trailAlpha = rawAlpha;
    p.trailAlpha += (rawAlpha - p.trailAlpha) * 0.15;
    const alpha = p.trailAlpha;
    const size = p.size * (0.7 + 0.6 * alpha) * pt.persp;

    const grad = trailCtx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, size * 4);
    grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
    grad.addColorStop(0.4, `rgba(200,220,255,${alpha * 0.5})`);
    grad.addColorStop(1, 'rgba(200,220,255,0)');
    trailCtx.fillStyle = grad;
    trailCtx.beginPath();
    trailCtx.arc(pt.x, pt.y, size * 4, 0, Math.PI * 2);
    trailCtx.fill();

    trailCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    trailCtx.beginPath();
    trailCtx.arc(pt.x, pt.y, size * 0.6, 0, Math.PI * 2);
    trailCtx.fill();
  }

  trailCtx.restore();
}

function drawRingCrisp(particles, rot, ringVisible, activeHalf) {
  // crisp pass: guide outline + every particle, drawn fresh each frame (no trail)
  if (!ringVisible) {
    // still advance each particle's twinkle clock even while the whole ring
    // is in its "off" beat, so brightness timing stays continuous
    for (const p of particles) { p.twinkle += p.twinkleSpeed; }
    return;
  }
  const cx = ringPos.x * canvasElement.width, cy = ringPos.y * canvasElement.height;
  const focal = 500;
  const R = currentSizePx;
  const ringTiltX = 0.35;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  ctx.beginPath();
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 1;
  for (let i = 0; i < guidePoints.length; i++) {
    const a = guidePoints[i].angle;
    const gx = Math.cos(a), gy = Math.sin(a) * ringTiltX, gz = 0;
    const pt = project3D(gx, gy, gz, rot, cx, cy, R, focal);
    if (i === 0) ctx.moveTo(pt.x, pt.y);
    else ctx.lineTo(pt.x, pt.y);
  }
  ctx.stroke();

  for (const p of particles) {
    p.twinkle += p.twinkleSpeed;
    if (p.group !== activeHalf) continue; // only the currently-active half is shown
    const rad = p.rJitter;
    const ex = Math.cos(p.angle) * rad;
    const ey = Math.sin(p.angle) * rad * ringTiltX;
    const ez = p.zOff * rad;
    const pt = project3D(ex, ey, ez, rot, cx, cy, R, focal);

    const alpha = 0.5 + 0.5 * Math.sin(p.twinkle);
    const size = p.size * (0.7 + 0.6 * alpha) * pt.persp;

    const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, size * 4);
    grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
    grad.addColorStop(0.4, `rgba(200,220,255,${alpha * 0.5})`);
    grad.addColorStop(1, 'rgba(200,220,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, size * 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, size * 0.6, 0, Math.PI * 2);
    ctx.fill();

    if (p.label) {
      ctx.font = '11px monospace';
      ctx.fillStyle = `rgba(255,255,255,${Math.min(1, alpha + 0.35)})`;
      ctx.fillText('#' + p.label, pt.x + 6, pt.y - 4);
    }
  }

  ctx.restore();
}

draw();
</script>
</body>
</html>
