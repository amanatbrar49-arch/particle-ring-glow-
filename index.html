<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cyber Slinky — Hand Tracker</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; height:100%; }
  #container { position:relative; width:100vw; height:100vh; }
  video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  #hint {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.6); font:12px monospace; letter-spacing:1px;
    background:rgba(0,0,0,0.4); padding:6px 14px; border-radius:20px; pointer-events:none;
    text-align:center; white-space:nowrap;
  }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="output"></canvas>
  <div id="hint">slinky sits on your index fingertip — open the OTHER palm to expand it</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('output');
const ctx = canvasElement.getContext('2d');

function resize(){
  canvasElement.width = window.innerWidth;
  canvasElement.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ---------------- Geometry ----------------
// Two thin ring "orbits" (like the reference) instead of one thick coil.
// Each ring is a simple circle of sparse glowing points, each ring tumbles
// independently and fast on its own X/Y/Z axes so they cross each other
// like a fast-spinning atom-orbit — plus a bright pulsing nucleus at the center.
const R_MAJOR = 1;
const RING_A_POINTS = 70;
const RING_B_POINTS = 70;

function buildRing(count, labelChance) {
  const pts = [];
  for (let i = 0; i < count; i++) {
    const theta = (i / count) * Math.PI * 2;
    pts.push({
      x: R_MAJOR * Math.cos(theta),
      y: R_MAJOR * Math.sin(theta),
      z: 0,
      theta,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: Math.random() * 0.06 + 0.03,
      label: Math.random() < labelChance ? (Math.floor(Math.random() * 9000) + 1000) : null
    });
  }
  return pts;
}
let ringA = buildRing(RING_A_POINTS, 0.06);
let ringB = buildRing(RING_B_POINTS, 0.06);

// sparse loose dust, kept light so it doesn't muddy the shape
const HALO_POINTS = 36;
let haloPoints = [];
for (let i = 0; i < HALO_POINTS; i++) {
  const theta = Math.random() * Math.PI * 2;
  const spread = 1.05 + Math.random() * 0.5;
  haloPoints.push({
    x: Math.cos(theta) * R_MAJOR * spread,
    y: Math.sin(theta) * R_MAJOR * spread,
    z: (Math.random() - 0.5) * 0.4,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: Math.random() * 0.05 + 0.02
  });
}

// independent fast tumble per ring — different axis speeds so they cross like orbit paths
let rotA = { x: 0, y: 0.6, z: 1.4 };
let rotB = { x: 1.1, y: 2.1, z: 0.3 };
const SPEED_A = { x: 0.10, y: 0.16, z: 0.07 };
const SPEED_B = { x: 0.14, y: 0.09, z: 0.12 };

// ---------------- Size state ----------------
const SMALL_PX = 16;
const LARGE_PX = 220;
let currentSizePx = SMALL_PX;
let targetSizePx = SMALL_PX;

// ---------------- Ring position (smoothed) ----------------
let ringPos = { x: 0.5, y: 0.5 };
let ringPosInit = false;

// ---------------- Hand tracking ----------------
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

let latestHands = [];
hands.onResults((results) => {
  latestHands = [];
  if (results.multiHandLandmarks) {
    for (const lm of results.multiHandLandmarks) latestHands.push(lm);
  }
});

const camera = new Camera(videoElement, {
  onFrame: async () => { await hands.send({ image: videoElement }); },
  width: 1280,
  height: 720
});
camera.start();

let holdingFingerPos = null;

function mirroredNorm(lm) { return { x: 1 - lm.x, y: lm.y }; }

function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y, dz = (a.z || 0) - (b.z || 0);
  return Math.sqrt(dx * dx + dy * dy + dz * dz);
}

function palmOpenness(lm) {
  const wrist = lm[0], midMcp = lm[9];
  const palmSize = dist(wrist, midMcp) || 0.0001;
  const tips = [8, 12, 16, 20].map(i => dist(wrist, lm[i]) / palmSize);
  const avg = tips.reduce((a, b) => a + b, 0) / tips.length;
  const t = (avg - 1.3) / (2.6 - 1.3);
  return Math.max(0, Math.min(1, t));
}

function pickHoldingHand() {
  if (latestHands.length === 0) return { holding: null, other: null };
  if (latestHands.length === 1) return { holding: latestHands[0], other: null };

  const tip0 = mirroredNorm(latestHands[0][8]);
  const tip1 = mirroredNorm(latestHands[1][8]);

  if (!holdingFingerPos) {
    holdingFingerPos = tip0;
    return { holding: latestHands[0], other: latestHands[1] };
  }
  const d0 = Math.hypot(tip0.x - holdingFingerPos.x, tip0.y - holdingFingerPos.y);
  const d1 = Math.hypot(tip1.x - holdingFingerPos.x, tip1.y - holdingFingerPos.y);
  if (d0 <= d1) return { holding: latestHands[0], other: latestHands[1] };
  return { holding: latestHands[1], other: latestHands[0] };
}

// ---------------- Draw loop ----------------
function draw() {
  const w = canvasElement.width, h = canvasElement.height;

  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.fillRect(0, 0, w, h);
  ctx.globalCompositeOperation = 'source-over';

  const { holding, other } = pickHoldingHand();

  if (holding) {
    const tipN = mirroredNorm(holding[8]);
    if (!ringPosInit) { ringPos.x = tipN.x; ringPos.y = tipN.y; ringPosInit = true; }
    ringPos.x += (tipN.x - ringPos.x) * 0.35;
    ringPos.y += (tipN.y - ringPos.y) * 0.35;
    holdingFingerPos = tipN;
  }

  if (other) {
    const openT = palmOpenness(other);
    targetSizePx = SMALL_PX + (LARGE_PX - SMALL_PX) * openT;
  } else {
    targetSizePx = SMALL_PX;
  }
  currentSizePx += (targetSizePx - currentSizePx) * 0.12;

  rotA.x += SPEED_A.x; rotA.y += SPEED_A.y; rotA.z += SPEED_A.z;
  rotB.x += SPEED_B.x; rotB.y += SPEED_B.y; rotB.z += SPEED_B.z;

  if (holding) drawSlinky();

  requestAnimationFrame(draw);
}

function project(p, cx, cy, scale, focal, rot) {
  const cosX = Math.cos(rot.x), sinX = Math.sin(rot.x);
  const cosY = Math.cos(rot.y), sinY = Math.sin(rot.y);
  const cosZ = Math.cos(rot.z), sinZ = Math.sin(rot.z);
  let x = p.x, y = p.y, z = p.z;

  let y1 = y * cosX - z * sinX;
  let z1 = y * sinX + z * cosX;
  y = y1; z = z1;

  let x1 = x * cosY + z * sinY;
  let z2 = -x * sinY + z * cosY;
  x = x1; z = z2;

  let x2 = x * cosZ - y * sinZ;
  let y2 = x * sinZ + y * cosZ;
  x = x2; y = y2;

  const px = x * scale, py = y * scale, pz = z * scale;
  const persp = focal / (focal + pz);
  return { x: cx + px * persp, y: cy + py * persp, persp };
}

function drawRingPath(points, rot, cx, cy, scale, focal, lineAlpha) {
  ctx.beginPath();
  ctx.strokeStyle = `rgba(210,235,255,${lineAlpha})`;
  ctx.lineWidth = Math.max(0.7, scale * 0.008);
  for (let i = 0; i <= points.length; i++) {
    const p = points[i % points.length];
    const pt = project(p, cx, cy, scale, focal, rot);
    if (i === 0) ctx.moveTo(pt.x, pt.y);
    else ctx.lineTo(pt.x, pt.y);
  }
  ctx.stroke();
}

function drawRingDots(points, rot, cx, cy, scale, focal, now) {
  for (const p of points) {
    const pt = project(p, cx, cy, scale, focal, rot);
    const twinkle = 0.5 + 0.5 * Math.sin(p.twinkle + now * p.twinkleSpeed * 15);
    const depthB = Math.max(0.3, Math.min(1.1, pt.persp - 0.3));
    const alpha = twinkle * depthB;
    const r = Math.max(0.6, scale * 0.018 * pt.persp);

    const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, r * 2.4);
    grad.addColorStop(0, `rgba(255,255,255,${0.85 * alpha})`);
    grad.addColorStop(1, 'rgba(200,225,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, r * 2.4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, alpha + 0.2)})`;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, r * 0.5, 0, Math.PI * 2);
    ctx.fill();

    if (p.label && scale > 26) {
      const fontSize = Math.max(9, scale * 0.06);
      ctx.font = `${fontSize}px monospace`;
      const label = '#' + p.label;
      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(0,0,0,0.6)';
      ctx.strokeText(label, pt.x + r * 3, pt.y - r);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fillText(label, pt.x + r * 3, pt.y - r);
    }
  }
}

function drawSlinky() {
  const cx = ringPos.x * canvasElement.width, cy = ringPos.y * canvasElement.height;
  const focal = 500;
  const scale = currentSizePx;
  const now = Date.now() * 0.001;

  ctx.save();

  // nucleus glow at the center, pulsing
  ctx.globalCompositeOperation = 'lighter';
  const pulse = 0.75 + 0.25 * Math.sin(now * 6);
  const nucR = Math.max(3, scale * 0.16) * pulse;
  const nucGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, nucR * 3);
  nucGrad.addColorStop(0, 'rgba(255,255,255,0.95)');
  nucGrad.addColorStop(0.35, 'rgba(200,225,255,0.5)');
  nucGrad.addColorStop(1, 'rgba(200,225,255,0)');
  ctx.fillStyle = nucGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, nucR * 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.arc(cx, cy, nucR * 0.55, 0, Math.PI * 2);
  ctx.fill();

  // sparse loose halo dust (kept light)
  for (const p of haloPoints) {
    const pt = project(p, cx, cy, scale, focal, rotA);
    const twinkle = 0.4 + 0.4 * Math.sin(p.twinkle + now * p.twinkleSpeed * 15);
    ctx.fillStyle = `rgba(220,235,255,${twinkle * 0.35})`;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, Math.max(0.5, scale * 0.008), 0, Math.PI * 2);
    ctx.fill();
  }

  // two thin tumbling ring orbits
  drawRingPath(ringA, rotA, cx, cy, scale, focal, 0.45);
  drawRingPath(ringB, rotB, cx, cy, scale, focal, 0.45);
  drawRingDots(ringA, rotA, cx, cy, scale, focal, now);
  drawRingDots(ringB, rotB, cx, cy, scale, focal, now);

  ctx.restore();
}

draw();
</script>
</body>
</html>
