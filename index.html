<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cyber Slinky — Hand Tracker</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; height:100%; }
  #container { position:relative; width:100vw; height:100vh; }
  video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  #hint {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.6); font:12px monospace; letter-spacing:1px;
    background:rgba(0,0,0,0.4); padding:6px 14px; border-radius:20px; pointer-events:none;
    text-align:center; white-space:nowrap;
  }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="output"></canvas>
  <div id="hint">slinky sits on your index fingertip — open the OTHER palm to expand it</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('output');
const ctx = canvasElement.getContext('2d');

function resize(){
  canvasElement.width = window.innerWidth;
  canvasElement.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ---------------- Torus / slinky geometry ----------------
// A slinky bent into a ring == a coil (many small windings) wrapped once around a torus.
// Rendered as individual glowing star-dust points (not a connected wire) to match
// the original reference look: scattered glowing particles + faint ring guide + number tags.
const POINTS = 260;
const WINDINGS = 30;      // how many coil loops around the tube
const R_MAJOR = 1;        // normalized major radius
const R_MINOR = 0.34;     // normalized tube radius
let basePoints = [];
for (let i = 0; i < POINTS; i++) {
  const t = i / (POINTS - 1);
  const theta = t * Math.PI * 2;              // around the big ring
  const phi = t * Math.PI * 2 * WINDINGS;      // around the little coil
  const x = (R_MAJOR + R_MINOR * Math.cos(phi)) * Math.cos(theta);
  const y = (R_MAJOR + R_MINOR * Math.cos(phi)) * Math.sin(theta);
  const z = R_MINOR * Math.sin(phi);
  basePoints.push({
    x, y, z,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: Math.random() * 0.08 + 0.03,
    sizeJitter: Math.random() * 0.7 + 0.6,
    label: Math.random() < 0.14 ? (Math.floor(Math.random() * 9000) + 1000) : null
  });
}

// loose scattered dust around the ring, like stray particles drifting off the coil
const HALO_POINTS = 140;
let haloPoints = [];
for (let i = 0; i < HALO_POINTS; i++) {
  const theta = Math.random() * Math.PI * 2;
  const spread = 1 + Math.random() * 0.9; // sits further out than the coil tube
  const wobble = (Math.random() - 0.5) * 0.5;
  haloPoints.push({
    x: Math.cos(theta) * R_MAJOR * spread,
    y: Math.sin(theta) * R_MAJOR * spread,
    z: wobble,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: Math.random() * 0.06 + 0.02,
    sizeJitter: Math.random() * 0.8 + 0.4,
    label: Math.random() < 0.1 ? (Math.floor(Math.random() * 9000) + 1000) : null
  });
}

// pure guide circle (no coil offset) so a thin ellipse outline is always visible, like the reference
const GUIDE_POINTS = 100;
let guideBasePoints = [];
for (let i = 0; i <= GUIDE_POINTS; i++) {
  const theta = (i / GUIDE_POINTS) * Math.PI * 2;
  guideBasePoints.push({
    x: R_MAJOR * Math.cos(theta),
    y: R_MAJOR * Math.sin(theta),
    z: 0
  });
}

// continuous fast spin, independent speeds per axis so it tumbles in all planes
let rotX = 0, rotY = 0, rotZ = 0;
const SPEED_X = 0.11, SPEED_Y = 0.15, SPEED_Z = 0.08;

// ---------------- Size state ----------------
const SMALL_PX = 16;   // tiny, sitting on the fingertip
const LARGE_PX = 240;  // fully expanded
let currentSizePx = SMALL_PX;
let targetSizePx = SMALL_PX;

// ---------------- Ring position (smoothed) ----------------
let ringPos = { x: 0.5, y: 0.5 };
let ringPosInit = false;

// ---------------- Hand tracking ----------------
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

let latestHands = []; // [{lm, fingertipNorm:{x,y}}]
hands.onResults((results) => {
  latestHands = [];
  if (results.multiHandLandmarks) {
    for (const lm of results.multiHandLandmarks) {
      latestHands.push(lm);
    }
  }
});

const camera = new Camera(videoElement, {
  onFrame: async () => { await hands.send({ image: videoElement }); },
  width: 1280,
  height: 720
});
camera.start();

// which hand (by index-fingertip screen position at time of assignment) is "holding" the slinky
let holdingFingerPos = null; // {x,y} in normalized (mirrored) coords

function mirroredNorm(lm) {
  return { x: 1 - lm.x, y: lm.y };
}

function palmOpenness(lm) {
  // 0 = closed fist, 1 = fully open hand
  const wrist = lm[0];
  const midMcp = lm[9];
  const palmSize = dist(wrist, midMcp) || 0.0001;
  const tips = [8, 12, 16, 20].map(i => dist(wrist, lm[i]) / palmSize);
  const avg = tips.reduce((a, b) => a + b, 0) / tips.length;
  const t = (avg - 1.3) / (2.6 - 1.3);
  return Math.max(0, Math.min(1, t));
}

function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y, dz = (a.z || 0) - (b.z || 0);
  return Math.sqrt(dx * dx + dy * dy + dz * dz);
}

function pickHoldingHand(w, h) {
  if (latestHands.length === 0) return { holding: null, other: null };
  if (latestHands.length === 1) return { holding: latestHands[0], other: null };

  // two hands: whichever fingertip is currently closer to the slinky keeps holding it,
  // unless no assignment yet, then default to hand 0
  const tip0 = mirroredNorm(latestHands[0][8]);
  const tip1 = mirroredNorm(latestHands[1][8]);

  if (!holdingFingerPos) {
    holdingFingerPos = tip0;
    return { holding: latestHands[0], other: latestHands[1] };
  }

  const d0 = Math.hypot(tip0.x - holdingFingerPos.x, tip0.y - holdingFingerPos.y);
  const d1 = Math.hypot(tip1.x - holdingFingerPos.x, tip1.y - holdingFingerPos.y);

  if (d0 <= d1) return { holding: latestHands[0], other: latestHands[1] };
  return { holding: latestHands[1], other: latestHands[0] };
}

// ---------------- Draw loop ----------------
function draw() {
  const w = canvasElement.width, h = canvasElement.height;

  // fade trail: erase a little alpha each frame instead of clearing,
  // so the glow trail persists and the video underneath stays visible
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.fillRect(0, 0, w, h);
  ctx.globalCompositeOperation = 'source-over';

  const { holding, other } = pickHoldingHand(w, h);

  if (holding) {
    const tipN = mirroredNorm(holding[8]);
    if (!ringPosInit) { ringPos.x = tipN.x; ringPos.y = tipN.y; ringPosInit = true; }
    ringPos.x += (tipN.x - ringPos.x) * 0.35;
    ringPos.y += (tipN.y - ringPos.y) * 0.35;
    holdingFingerPos = tipN;
  }

  if (other) {
    const openT = palmOpenness(other);
    targetSizePx = SMALL_PX + (LARGE_PX - SMALL_PX) * openT;
  } else {
    targetSizePx = SMALL_PX;
  }
  currentSizePx += (targetSizePx - currentSizePx) * 0.12;

  // keep spinning fast, always, on all three axes
  rotX += SPEED_X;
  rotY += SPEED_Y;
  rotZ += SPEED_Z;

  if (holding) {
    drawSlinky(w, h);
  }

  requestAnimationFrame(draw);
}

function project(p, cx, cy, scale, focal, cosX, sinX, cosY, sinY, cosZ, sinZ) {
  let x = p.x, y = p.y, z = p.z;

  let y1 = y * cosX - z * sinX;
  let z1 = y * sinX + z * cosX;
  y = y1; z = z1;

  let x1 = x * cosY + z * sinY;
  let z2 = -x * sinY + z * cosY;
  x = x1; z = z2;

  let x2 = x * cosZ - y * sinZ;
  let y2 = x * sinZ + y * cosZ;
  x = x2; y = y2;

  const px = x * scale, py = y * scale, pz = z * scale;
  const persp = focal / (focal + pz);
  return { x: cx + px * persp, y: cy + py * persp, persp };
}

function drawSlinky(w, h) {
  const cx = ringPos.x * w, cy = ringPos.y * h;
  const focal = 500;
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  const cosZ = Math.cos(rotZ), sinZ = Math.sin(rotZ);
  const scale = currentSizePx;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  // faint guide ellipse (the thin ring outline visible in the reference)
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(230,240,255,0.35)';
  ctx.lineWidth = Math.max(0.6, scale * 0.006);
  for (let i = 0; i < guideBasePoints.length; i++) {
    const pt = project(guideBasePoints[i], cx, cy, scale, focal, cosX, sinX, cosY, sinY, cosZ, sinZ);
    if (i === 0) ctx.moveTo(pt.x, pt.y);
    else ctx.lineTo(pt.x, pt.y);
  }
  ctx.stroke();

  drawParticleSet(basePoints, cx, cy, scale, focal, cosX, sinX, cosY, sinY, cosZ, sinZ, 1.0);
  drawParticleSet(haloPoints, cx, cy, scale, focal, cosX, sinX, cosY, sinY, cosZ, sinZ, 0.7);

  ctx.restore();
}

function drawParticleSet(points, cx, cy, scale, focal, cosX, sinX, cosY, sinY, cosZ, sinZ, weight) {
  const now = Date.now() * 0.001;
  for (const p of points) {
    const pt = project(p, cx, cy, scale, focal, cosX, sinX, cosY, sinY, cosZ, sinZ);
    const twinkle = 0.5 + 0.5 * Math.sin(p.twinkle + now * p.twinkleSpeed * 20);
    const depthB = Math.max(0.25, Math.min(1.2, pt.persp - 0.3));
    const alpha = twinkle * depthB * weight;
    const r = Math.max(0.7, scale * 0.03 * p.sizeJitter * pt.persp);

    const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, r * 4.5);
    grad.addColorStop(0, `rgba(255,255,255,${0.95 * alpha})`);
    grad.addColorStop(0.4, `rgba(190,220,255,${0.5 * alpha})`);
    grad.addColorStop(1, 'rgba(190,220,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, r * 4.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, alpha + 0.15)})`;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, r * 0.55, 0, Math.PI * 2);
    ctx.fill();

    if (p.label && scale > 30) {
      ctx.font = `${Math.max(7, scale * 0.045)}px monospace`;
      ctx.fillStyle = `rgba(255,255,255,${0.4 * alpha})`;
      ctx.fillText('#' + p.label, pt.x + r * 2, pt.y - r);
    }
  }
}

draw();
</script>
</body>
</html>
