<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Glow Particle Ring — Hand Tracker</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; height:100%; }
  #container { position:relative; width:100vw; height:100vh; }
  video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  #hint {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.6); font:12px monospace; letter-spacing:1px;
    background:rgba(0,0,0,0.4); padding:6px 14px; border-radius:20px; pointer-events:none;
  }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="output"></canvas>
  <div id="hint">show one or two hands — pinch / point to move the ring</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('output');
const canvasCtx = canvasElement.getContext('2d');

function resize(){
  canvasElement.width = window.innerWidth;
  canvasElement.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ---------- Particle field (ring + surrounding halo, like the screenshot) ----------
const NUM_PARTICLES = 450;
let particles = [];
for (let i = 0; i < NUM_PARTICLES; i++) {
  const onRing = Math.random() < 0.55;
  particles.push({
    angle: Math.random() * Math.PI * 2,
    rJitter: onRing ? (1 + (Math.random() - 0.5) * 0.07) : (1 + Math.random() * 0.9),
    speed: (Math.random() - 0.5) * 0.004 + 0.0015,
    size: onRing ? Math.random() * 2 + 1 : Math.random() * 3 + 1,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: Math.random() * 0.05 + 0.02,
    zOff: (Math.random() - 0.5) * 0.4,
    label: Math.random() < 0.15 ? (Math.floor(Math.random() * 9000) + 1000) : null
  });
}

let ringCenter = { x: 0.5, y: 0.5 };
let ringRadius = 220;
const ringTiltX = 0.35;     // squish for the tilted-ellipse perspective
let ringRotation = 0;
let targetRotation = 0;

// ---------- Hand tracking ----------
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

let handPoints = [];
hands.onResults((results) => {
  handPoints = [];
  if (results.multiHandLandmarks) {
    for (const lm of results.multiHandLandmarks) {
      handPoints.push(lm[8]); // index fingertip
    }
  }
});

const camera = new Camera(videoElement, {
  onFrame: async () => { await hands.send({ image: videoElement }); },
  width: 1280,
  height: 720
});
camera.start();

// ---------- Draw loop ----------
function draw() {
  const w = canvasElement.width, h = canvasElement.height;
  canvasCtx.clearRect(0, 0, w, h);

  if (handPoints.length >= 2) {
    const p1 = handPoints[0], p2 = handPoints[1];
    const mx = 1 - ((p1.x + p2.x) / 2); // mirror to match mirrored video
    const my = (p1.y + p2.y) / 2;
    ringCenter.x += (mx - ringCenter.x) * 0.15;
    ringCenter.y += (my - ringCenter.y) * 0.15;
    const dx = (p2.x - p1.x) * w, dy = (p2.y - p1.y) * h;
    const dist = Math.sqrt(dx * dx + dy * dy);
    ringRadius += ((dist * 0.9) - ringRadius) * 0.15;
    targetRotation = Math.atan2(dy, dx);
  } else if (handPoints.length === 1) {
    const p = handPoints[0];
    const mx = 1 - p.x, my = p.y;
    ringCenter.x += (mx - ringCenter.x) * 0.15;
    ringCenter.y += (my - ringCenter.y) * 0.15;
  }
  ringRotation += (targetRotation - ringRotation) * 0.1;

  const cx = ringCenter.x * w, cy = ringCenter.y * h;
  const R = Math.max(60, ringRadius);
  const cosR = Math.cos(ringRotation), sinR = Math.sin(ringRotation);

  canvasCtx.save();
  canvasCtx.globalCompositeOperation = 'lighter';

  for (const p of particles) {
    p.angle += p.speed;
    p.twinkle += p.twinkleSpeed;
    const rad = R * p.rJitter;
    let ex = Math.cos(p.angle) * rad;
    let ey = Math.sin(p.angle) * rad * ringTiltX;
    const rx = ex * cosR - ey * sinR;
    const ry = ex * sinR + ey * cosR;
    const x = cx + rx, y = cy + ry + p.zOff * rad * 0.2;

    const alpha = 0.5 + 0.5 * Math.sin(p.twinkle);
    const size = p.size * (0.7 + 0.6 * alpha);

    // glow
    const grad = canvasCtx.createRadialGradient(x, y, 0, x, y, size * 4);
    grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
    grad.addColorStop(0.4, `rgba(200,220,255,${alpha * 0.5})`);
    grad.addColorStop(1, 'rgba(200,220,255,0)');
    canvasCtx.fillStyle = grad;
    canvasCtx.beginPath();
    canvasCtx.arc(x, y, size * 4, 0, Math.PI * 2);
    canvasCtx.fill();

    // core dot
    canvasCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    canvasCtx.beginPath();
    canvasCtx.arc(x, y, size * 0.6, 0, Math.PI * 2);
    canvasCtx.fill();

    if (p.label) {
      canvasCtx.font = '9px monospace';
      canvasCtx.fillStyle = `rgba(255,255,255,${alpha * 0.5})`;
      canvasCtx.fillText('#' + p.label, x + 6, y - 4);
    }
  }

  // ring outline
  canvasCtx.beginPath();
  canvasCtx.strokeStyle = 'rgba(255,255,255,0.45)';
  canvasCtx.lineWidth = 1;
  const steps = 100;
  for (let i = 0; i <= steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    let ex = Math.cos(a) * R;
    let ey = Math.sin(a) * R * ringTiltX;
    const rx = ex * cosR - ey * sinR;
    const ry = ex * sinR + ey * cosR;
    const x = cx + rx, y = cy + ry;
    if (i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
  }
  canvasCtx.stroke();

  canvasCtx.restore();
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
